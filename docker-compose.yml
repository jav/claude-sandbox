services:
  sandbox:
    build:
      context: .
      dockerfile: ${DOCKERFILE:-Dockerfile}
      args:
        USERNAME: ${SANDBOX_USER:-claude}
        USER_UID: ${SANDBOX_UID:-1000}
        USER_GID: ${SANDBOX_GID:-1000}
    image: ${SANDBOX_NAME:-claude-sandbox}:latest
    container_name: ${SANDBOX_NAME:-claude-sandbox}
    hostname: ${SANDBOX_NAME:-claude-sandbox}
    stdin_open: true
    tty: true
    working_dir: ${PROJECT_DIR:-.}
    volumes:
      - ${PROJECT_DIR:-.}:${PROJECT_DIR:-.}
      - ./volumes/home:/home/${SANDBOX_USER:-claude}
    environment:
      - TERM=xterm-256color
    restart: unless-stopped
